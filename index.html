<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <title>Lista de Compras</title>
</head>

<body>
    <img src="assets/logo.svg" alt="Logo Quicklist" id="logo">

    <main>
        <header>
            <button type="button">
                <img src="assets/arrow-left-icon.svg" alt="">
                <span class="text-link">Voltar</span>
            </button>
            <h1 class="text-title">Compras da semana</h1>
        </header>

        <form>
            <input type="text" id="newItemInput" placeholder="Adicionar um novo item" required>
            <button type="submit">
                <span class="text-label">Adicionar item</span>
            </button>
        </form>

        <ul id="buyList">
            <!--Itens entram aqui via js-->
        </ul>

        <footer>
            <div class="removedItemNotice">
                <div>
                    <img src="assets/alert-icon.svg" alt="Aviso de item excluído">
                    <span class="text-label">O item foi removido da lista</span>
                </div>

                <button class="closeNoticeBtn">
                    <img src="assets/close-icon.svg" alt="Fechar aviso de item excluído">
                </button>
            </div>
        </footer>
    </main>


    <script src="scripts.js"></script>
</body>

</html>
